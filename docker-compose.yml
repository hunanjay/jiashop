services:
  backend:
    build:
      context: .
    ports:
      - "${PORT:-5050}:${PORT:-5050}"
    volumes:
      - .:/app
    env_file:
      - ./.env
    depends_on:
      - db
    restart: always

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-gift_db}
    ports:
      - "5432:5432"
    volumes:
      - zjl_db:/var/lib/postgresql/data
    restart: always

volumes:
  zjl_db:
    name: zjl_db
